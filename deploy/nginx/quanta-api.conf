# Quanta API — quantaapi.durdumehmetkeskin.space
# Cloudflare (proxied DNS) terminates public TLS; this origin listens on 80.
# For Cloudflare SSL mode "Full (strict)", enable the 443 block below with a
# Cloudflare Origin Certificate.

server {
    listen 80;
    server_name quantaapi.durdumehmetkeskin.space;

    client_max_body_size 5m;

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # Behind Cloudflare the real visitor IP is in CF-Connecting-IP;
        # fall back to the direct peer address when it is absent.
        set $client_ip $remote_addr;
        if ($http_cf_connecting_ip != "") {
            set $client_ip $http_cf_connecting_ip;
        }
        proxy_set_header X-Real-IP $client_ip;
        proxy_set_header X-Forwarded-For $client_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

