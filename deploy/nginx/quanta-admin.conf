# Quanta Admin Panel — quanta.durdumehmetkeskin.space
# The admin container's internal nginx already proxies /api/ to the api
# service, so a single upstream is enough here.

server {
    listen 80;
    server_name quanta.durdumehmetkeskin.space;

    client_max_body_size 5m;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        set $client_ip $remote_addr;
        if ($http_cf_connecting_ip != "") {
            set $client_ip $http_cf_connecting_ip;
        }
        proxy_set_header X-Real-IP $client_ip;
        proxy_set_header X-Forwarded-For $client_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Cloudflare "Full (strict)" (optional) -------------------------------
# See quanta-api.conf for instructions; mirror the 443 block here with
# server_name quanta.durdumehmetkeskin.space and proxy_pass 127.0.0.1:8090.
